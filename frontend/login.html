<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 案件驾驶舱</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        background: #f4f7fb;
        color: #172033;
      }

      .login-panel {
        width: min(420px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid #dfe7f2;
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 18px 50px rgba(20, 46, 82, 0.12);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        line-height: 1.25;
      }

      .sub {
        margin: 0 0 28px;
        color: #66758b;
        font-size: 14px;
      }

      label {
        display: block;
        margin: 18px 0 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 42px;
        border: 1px solid #ccd7e6;
        border-radius: 6px;
        padding: 0 12px;
        font-size: 15px;
      }

      input:focus {
        outline: 2px solid #9cc7ff;
        border-color: #2f80ed;
      }

      button {
        width: 100%;
        height: 44px;
        margin-top: 26px;
        border: 0;
        border-radius: 6px;
        background: #1d63d8;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.72;
        cursor: wait;
      }

      .error {
        min-height: 20px;
        margin-top: 14px;
        color: #c62828;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="login-panel">
      <h1>案件驾驶舱登录</h1>
      <p class="sub">请输入系统账号后继续访问案件、文档和系统设置。</p>
      <form id="login-form">
        <label for="username">账号</label>
        <input id="username" autocomplete="username" value="admin" required />
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button id="submit" type="submit">登录</button>
        <div id="error" class="error"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#login-form");
      const submit = document.querySelector("#submit");
      const error = document.querySelector("#error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        submit.disabled = true;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.querySelector("#username").value.trim(),
              password: document.querySelector("#password").value,
            }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.detail || "登录失败");
          }
          localStorage.setItem("auth_token", data.access_token);
          localStorage.setItem("auth_user", JSON.stringify(data.user || {}));
          const redirect = new URLSearchParams(window.location.search).get("redirect") || "/";
          window.location.href = redirect.startsWith("/") && !redirect.startsWith("//") ? redirect : "/";
        } catch (err) {
          error.textContent = err.message || "登录失败";
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
